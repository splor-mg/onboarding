        - [Blog Handbook splor](https://splor-mg.github.io/handbook/blog/).
        - [Carta de serviços SUBGEF/SEPLAG](https://cecad365.sharepoint.com/sites/cartadeservicos/) - Gefinho.
        - [Criação conta Bitwarden]().

